<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VEA Calculator — Division by Zero, Solved</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', system-ui, sans-serif;
    background: #000;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-user-select: none;
    user-select: none;
  }

  /* ── Container ── */
  .calc-wrap {
    width: 100%;
    max-width: 380px;
    padding: 24px 16px 16px;
  }

  /* ── Mode toggle ── */
  .mode-toggle {
    display: flex;
    background: #1c1c1e;
    border-radius: 9px;
    padding: 2px;
    margin-bottom: 8px;
  }
  .mode-btn {
    flex: 1;
    padding: 7px 12px;
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: #8e8e93;
    font-family: inherit;
  }
  .mode-btn.active {
    background: #636366;
    color: #fff;
  }

  /* ── Display ── */
  .display {
    text-align: right;
    padding: 8px 8px 12px;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    cursor: default;
  }
  .expression {
    font-size: 22px;
    font-weight: 300;
    color: #8e8e93;
    min-height: 28px;
    line-height: 1.3;
    word-break: break-all;
    margin-bottom: 4px;
  }
  .expression sub { font-size: 0.7em; }
  .result {
    font-size: 72px;
    font-weight: 300;
    color: #fff;
    line-height: 1;
    word-break: break-all;
    transition: color 0.15s;
    letter-spacing: -1px;
  }
  .result.virtual { color: #30d158; }
  .ceq { font-family: 'SF Mono', 'Menlo', monospace; letter-spacing: -1px; color: #ff9500; }
  .result.error { color: #ff453a; }
  .result sub {
    font-size: 0.45em;
    vertical-align: baseline;
    position: relative;
    top: 0.25em;
    letter-spacing: 0;
  }
  .result sup {
    font-size: 0.35em;
    vertical-align: baseline;
    position: relative;
    top: -0.8em;
  }
  .ph { opacity: 0.3; }

  /* ── Buttons ── */
  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: min(14px, 3.5vw);
  }
  .btn {
    aspect-ratio: 1;
    border-radius: 50%;
    border: none;
    font-size: 30px;
    font-weight: 400;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.08s;
    -webkit-tap-highlight-color: transparent;
    font-family: inherit;
    line-height: 1;
  }
  .btn:active { opacity: 0.6; }
  @media (hover: hover) {
    .btn:hover { opacity: 0.85; }
  }
  .btn-num { background: #333; color: #fff; }
  .btn-op {
    background: #ff9500;
    color: #fff;
    font-size: 34px;
  }
  .btn-op.active {
    background: #fff;
    color: #ff9500;
  }
  .btn-func {
    background: #a5a5a5;
    color: #000;
    font-size: 22px;
    font-weight: 500;
  }
  .btn-wide {
    grid-column: span 2;
    border-radius: 999px;
    aspect-ratio: auto;
    justify-content: flex-start;
    padding-left: 30px;
  }
  .btn sub {
    font-size: 0.55em;
    vertical-align: baseline;
    position: relative;
    top: 0.25em;
    margin-left: 1px;
  }

  /* ── Collapse ── */
  .btn-collapse {
    width: 100%;
    padding: 14px;
    margin-top: min(14px, 3.5vw);
    background: #1c1c1e;
    border: none;
    border-radius: 14px;
    color: #48484a;
    font-family: inherit;
    font-size: 15px;
    font-weight: 400;
    cursor: default;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .btn-collapse.available {
    color: #ff9500;
    cursor: pointer;
  }
  .btn-collapse.available:hover { background: #2c2c2e; }
  .btn-collapse.available:active { opacity: 0.6; }
  .btn-collapse .collapse-hint {
    font-size: 12px;
    color: #3a3a3c;
    margin-left: 6px;
  }
  .btn-collapse.available .collapse-hint { color: #636366; }

  /* ── History ── */
  .history-section {
    width: 100%;
    max-width: 380px;
    padding: 0 16px;
    margin-top: 16px;
  }
  .history-label {
    font-size: 11px;
    font-weight: 600;
    color: #48484a;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .history-list {
    max-height: 180px;
    overflow-y: auto;
  }
  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 5px 0;
    border-bottom: 1px solid #1c1c1e;
    font-size: 15px;
    font-weight: 300;
  }
  .hi-expr { color: #8e8e93; flex: 1; margin-right: 8px; }
  .hi-expr sub { font-size: 0.75em; }
  .hi-eq { color: #48484a; margin: 0 5px; }
  .hi-result { color: #fff; font-weight: 400; }
  .hi-result.virtual { color: #30d158; }
  .hi-result.error { color: #ff453a; }
  .hi-result sub { font-size: 0.7em; }

  /* ── Examples ── */
  .examples {
    width: 100%;
    max-width: 380px;
    padding: 0 16px;
    margin-top: 24px;
  }
  .examples-label {
    font-size: 11px;
    font-weight: 600;
    color: #48484a;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .example-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .example-chip {
    padding: 10px 4px;
    background: #1c1c1e;
    border: none;
    border-radius: 10px;
    color: #8e8e93;
    font-family: inherit;
    font-size: 14px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .example-chip:hover { background: #2c2c2e; color: #fff; }
  .example-chip sub { font-size: 0.7em; }

  /* ── Info ── */
  .info {
    width: 100%;
    max-width: 380px;
    padding: 24px 16px 32px;
    color: #48484a;
    font-size: 13px;
    line-height: 1.6;
    text-align: center;
  }
  .info strong { color: #8e8e93; font-weight: 500; }
  .info .vg { color: #30d158; }
  .info sub { font-size: 0.75em; }

  .powered {
    font-size: 11px;
    color: #3a3a3c;
    text-align: center;
    padding-bottom: 24px;
  }
</style>
</head>
<body>

<div class="calc-wrap">
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('vea')">VEA</button>
    <button class="mode-btn" onclick="setMode('standard')">Standard</button>
  </div>

  <div class="display" id="display">
    <div class="expression" id="expr">&nbsp;</div>
    <div class="result" id="result">0</div>
  </div>

  <div class="buttons" id="buttonGrid"></div>
  <button class="btn-collapse" id="collapseBtn" onclick="pressCollapse()">
    Collapse<span class="collapse-hint">— forget the index</span>
  </button>
</div>

<div class="history-section" id="historySection"></div>

<div class="examples" id="examplesSection">
  <div class="examples-label">Try these</div>
  <div class="example-grid">
    <button class="example-chip" onclick="tryExample('5 / 0')">5 ÷ 0</button>
    <button class="example-chip" onclick="tryExample('inf_5 * 0_1')">∞<sub>5</sub> × 0<sub>1</sub></button>
    <button class="example-chip" onclick="tryExample('0_3 * inf_7')">0<sub>3</sub> × ∞<sub>7</sub></button>
    <button class="example-chip" onclick="tryExample('10 / 0 + 6 / 0')">10÷0 + 6÷0</button>
    <button class="example-chip" onclick="tryExample('-3 / 0')">−3 ÷ 0</button>
    <button class="example-chip" onclick="tryExample('inf_10 / inf_5')">∞<sub>10</sub> ÷ ∞<sub>5</sub></button>
  </div>
</div>

<div class="info">
  <strong>What is this?</strong><br>
  Standard math says 5 ÷ 0 = <span style="color:#ff453a">ERROR</span>.<br>
  VEA says 5 ÷ 0 = <span class="vg">∞<sub>5</sub></span> — an infinity that remembers where it came from.<br>
  Multiply back: <span class="vg">∞<sub>5</sub></span> × 0<sub>1</sub> = 5. Information preserved.
</div>

<div class="powered">Powered by IVNA · Virtual Extended Arithmetic</div>

<script>
// ════════════════════════════════════════════════════════════
// IVNA Virtual Number Engine
// ════════════════════════════════════════════════════════════

class VNum {
  constructor(type, index, order = 1) {
    this.type = type;   // 'real', 'zero', 'inf'
    this.index = index; // the x in 0_x or ∞_x
    this.order = order; // the n in 0^n_x
  }
  toString() {
    if (this.type === 'real') return fmtNum(this.index);
    const sym = this.type === 'zero' ? '0' : '∞';
    const ord = this.order > 1 ? '^' + this.order : '';
    return sym + ord + '_' + fmtNum(this.index);
  }
  toHTML() {
    if (this._display) return this._display;
    if (this.type === 'real') return fmtNum(this.index);
    const sym = this.type === 'zero' ? '0' : '∞';
    const ord = this.order > 1 ? '<sup>' + this.order + '</sup>' : '';
    return sym + ord + '<sub>' + fmtNum(this.index) + '</sub>';
  }
  toRaw() {
    if (this._sum) return this._sum.left.toRaw() + ' ' + this._sum.op + ' ' + this._sum.right.toRaw();
    if (this.type === 'real') return fmtNum(this.index);
    if (this.type === 'zero') return '0_' + fmtNum(this.index);
    return 'inf_' + fmtNum(this.index);
  }
}

function fmtNum(n) {
  if (n === Infinity) return '∞';
  if (n === -Infinity) return '−∞';
  if (isNaN(n)) return 'NaN';
  if (Number.isInteger(n)) return n.toString();
  return n.toFixed(6).replace(/\.?0+$/, '');
}

function vReal(n) { return new VNum('real', n); }
function vZero(x, o) { return new VNum('zero', x, o || 1); }
function vInf(x, o) { return new VNum('inf', x, o || 1); }

// ── Arithmetic ──

function vmul(a, b) {
  // Distribute over irreducible sums: (x + y) * c = x*c + y*c
  if (a._sum) {
    var op = a._sum.op;
    return (op === '+' ? vadd : vsub)(vmul(a._sum.left, b), vmul(a._sum.right, b));
  }
  if (b._sum) {
    var op = b._sum.op;
    return (op === '+' ? vadd : vsub)(vmul(a, b._sum.left), vmul(a, b._sum.right));
  }
  if (a.type === 'real' && b.type === 'real') return vReal(a.index * b.index);
  // VEA mode: real 0 meeting a virtual number → treat as 0₁
  if (a.type === 'real' && a.index === 0 && (b.type === 'zero' || b.type === 'inf'))
    return vmul(vZero(1), b);
  if (a.type === 'real' && b.type === 'zero') return vZero(a.index * b.index, b.order);
  if (a.type === 'real' && b.type === 'inf')  return vInf(a.index * b.index, b.order);
  if ((a.type === 'zero' || a.type === 'inf') && b.type === 'real' && b.index === 0)
    return vmul(a, vZero(1));
  if (a.type === 'zero' && b.type === 'real') return vmul(b, a);
  if (a.type === 'inf'  && b.type === 'real') return vmul(b, a);
  if (a.type === 'zero' && b.type === 'zero') return vZero(a.index * b.index, a.order + b.order);
  if (a.type === 'inf'  && b.type === 'inf')  return vInf(a.index * b.index, a.order + b.order);
  if (a.type === 'zero' && b.type === 'inf') {
    if (a.order === b.order) return vReal(a.index * b.index);
    if (a.order > b.order)  return vZero(a.index * b.index, a.order - b.order);
    return vInf(a.index * b.index, b.order - a.order);
  }
  if (a.type === 'inf' && b.type === 'zero') return vmul(b, a);
}

function vdiv(a, b) {
  // Distribute numerator over sum: (x + y) / c = x/c + y/c
  if (a._sum) {
    var op = a._sum.op;
    return (op === '+' ? vadd : vsub)(vdiv(a._sum.left, b), vdiv(a._sum.right, b));
  }
  // Dividing by a sum is not distributable — leave irreducible
  if (b._sum) {
    var r = new VNum('real', NaN);
    r._display = a.toHTML() + ' / (' + b.toHTML() + ')';
    return r;
  }
  if (b.type === 'real' && b.index === 0) {
    if (a.type === 'real') return vInf(a.index, 1);
    // VEA: virtual / 0 → treat 0 as 0₁
    return vdiv(a, vZero(1));
  }
  // VEA: 0 / virtual → treat 0 as 0₁
  if (a.type === 'real' && a.index === 0 && (b.type === 'zero' || b.type === 'inf')) {
    return vdiv(vZero(1), b);
  }
  if (a.type === 'real' && b.type === 'real') return vReal(a.index / b.index);
  if (a.type === 'real' && b.type === 'zero') return vInf(a.index / b.index, b.order);
  if (a.type === 'real' && b.type === 'inf')  return vZero(a.index / b.index, b.order);
  if (a.type === 'zero' && b.type === 'real') return vZero(a.index / b.index, a.order);
  if (a.type === 'inf'  && b.type === 'real') return vInf(a.index / b.index, a.order);
  if (a.type === 'zero' && b.type === 'zero') {
    var idx = a.index / b.index;
    if (a.order === b.order) return vReal(idx);
    if (a.order > b.order)  return vZero(idx, a.order - b.order);
    return vInf(idx, b.order - a.order);
  }
  if (a.type === 'inf' && b.type === 'inf') {
    var idx = a.index / b.index;
    if (a.order === b.order) return vReal(idx);
    if (a.order > b.order)  return vInf(idx, a.order - b.order);
    return vZero(idx, b.order - a.order);
  }
  if (a.type === 'zero' && b.type === 'inf') return vZero(a.index / b.index, a.order + b.order);
  if (a.type === 'inf' && b.type === 'zero') return vInf(a.index / b.index, a.order + b.order);
  return vReal(NaN);
}

function vadd(a, b) {
  if (a.type === 'real' && b.type === 'real') return vReal(a.index + b.index);
  if (a.type === b.type && a.order === b.order) {
    var idx = a.index + b.index;
    if (idx === 0) return vReal(0);
    return new VNum(a.type, idx, a.order);
  }
  // Irreducible: sum of different kinds (real+virtual, zero+inf, different orders)
  var r = new VNum('real', NaN);
  r._display = a.toHTML() + ' + ' + b.toHTML();
  r._sum = { left: a, right: b, op: '+' };
  return r;
}

function vsub(a, b) {
  if (a.type === 'real' && b.type === 'real') return vReal(a.index - b.index);
  if (a.type === b.type && a.order === b.order) {
    var idx = a.index - b.index;
    if (idx === 0) return vReal(0);
    return new VNum(a.type, idx, a.order);
  }
  var r = new VNum('real', NaN);
  r._display = a.toHTML() + ' − ' + b.toHTML();
  r._sum = { left: a, right: b, op: '-' };
  return r;
}

// ── Parser ──

function parse(expr) {
  expr = expr.trim()
    .replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-')
    .replace(/-∞_?(-?\d*\.?\d+)/g, 'INF(-$1)')
    .replace(/∞_?(-?\d*\.?\d+)/g, 'INF($1)')
    .replace(/-inf_(-?\d*\.?\d+)/g, 'INF(-$1)')
    .replace(/inf_(-?\d*\.?\d+)/g, 'INF($1)')
    .replace(/0_(-?\d*\.?\d+)/g, 'ZERO($1)');

  var tokens = [];
  var i = 0;
  while (i < expr.length) {
    if (expr[i] === ' ') { i++; continue; }
    if (expr.startsWith('INF(', i)) {
      var end = expr.indexOf(')', i);
      tokens.push(vInf(parseFloat(expr.slice(i + 4, end))));
      i = end + 1;
    } else if (expr.startsWith('ZERO(', i)) {
      var end = expr.indexOf(')', i);
      tokens.push(vZero(parseFloat(expr.slice(i + 5, end))));
      i = end + 1;
    } else if ('+-*/'.includes(expr[i])) {
      var prev = tokens[tokens.length - 1];
      if (expr[i] === '-' && (tokens.length === 0 || typeof prev === 'string' && '+-*/('.includes(prev))) {
        var num = '-';
        i++;
        while (i < expr.length && /[\d.]/.test(expr[i])) { num += expr[i]; i++; }
        tokens.push(vReal(parseFloat(num)));
      } else {
        tokens.push(expr[i]);
        i++;
      }
    } else if (expr[i] === '(' || expr[i] === ')') {
      tokens.push(expr[i]); i++;
    } else {
      var num = '';
      while (i < expr.length && /[\d.]/.test(expr[i])) { num += expr[i]; i++; }
      if (num) tokens.push(vReal(parseFloat(num)));
      else i++; // skip unrecognized chars
    }
  }

  // Evaluate with operator precedence
  var j = 0;
  while (j < tokens.length) {
    if (tokens[j] === '*' || tokens[j] === '/') {
      var r = tokens[j] === '*' ? vmul(tokens[j-1], tokens[j+1]) : vdiv(tokens[j-1], tokens[j+1]);
      tokens.splice(j - 1, 3, r);
    } else j++;
  }
  j = 0;
  while (j < tokens.length) {
    if (tokens[j] === '+' || tokens[j] === '-') {
      var r = tokens[j] === '+' ? vadd(tokens[j-1], tokens[j+1]) : vsub(tokens[j-1], tokens[j+1]);
      tokens.splice(j - 1, 3, r);
    } else j++;
  }
  return tokens[0];
}


// ════════════════════════════════════════════════════════════
// UI State
// ════════════════════════════════════════════════════════════

var mode = 'vea';
var expression = '';
var undoStack = [];
var computed = false;
var lastResult = null;
var activeOp = null;
var historyItems = [];


// ════════════════════════════════════════════════════════════
// Button Handlers
// ════════════════════════════════════════════════════════════

function pushUndo() {
  undoStack.push(expression);
  if (undoStack.length > 50) undoStack.shift();
}

function pressDigit(d) {
  if (computed) { expression = ''; computed = false; lastResult = null; }
  activeOp = null;
  pushUndo();
  expression += d;
  updateDisplay();
}

function pressDot() {
  if (computed) { expression = '0'; computed = false; lastResult = null; }
  activeOp = null;
  var tail = (expression.match(/[\d.]*$/) || [''])[0];
  if (tail.includes('.')) return;
  pushUndo();
  expression += '.';
  updateDisplay();
}

function pressOp(op) {
  // Negative subscript: − right after 0_ or inf_
  if (op === '-' && /(?:0_|inf_)$/.test(expression)) {
    pushUndo();
    expression += '-';
    updateDisplay();
    return;
  }

  if (computed && lastResult) {
    expression = lastResult.toRaw();
    computed = false;
    lastResult = null;
  }

  // Remove incomplete subscripts and trailing operators
  expression = expression.replace(/(0_-?|inf_-?)$/, '');
  expression = expression.replace(/\s*[+\-*/]\s*$/, '');
  if (!expression) return;

  pushUndo();
  expression += ' ' + op + ' ';
  activeOp = op;
  updateDisplay();
}

function pressZeroSub() {
  if (computed) { expression = ''; computed = false; lastResult = null; }
  expression = expression.replace(/(0_-?|inf_-?)$/, '');
  // Auto-insert × after a number or completed virtual number
  if (expression && !/[+\-*/]\s*$/.test(expression)) {
    expression += ' * ';
  }
  activeOp = null;
  pushUndo();
  expression += '0_';
  updateDisplay();
}

function pressInfSub() {
  if (computed) { expression = ''; computed = false; lastResult = null; }
  expression = expression.replace(/(0_-?|inf_-?)$/, '');
  if (expression && !/[+\-*/]\s*$/.test(expression)) {
    expression += ' * ';
  }
  activeOp = null;
  pushUndo();
  expression += 'inf_';
  updateDisplay();
}

function pressEquals() {
  expression = expression.replace(/(0_-?|inf_-?)$/, '');
  expression = expression.replace(/\s*[+\-*/]\s*$/, '');
  if (!expression) return;

  try {
    if (mode === 'vea') {
      lastResult = parse(expression);
    } else {
      var val = Function('"use strict"; return (' + expression + ')')();
      lastResult = vReal(val);
      if (isNaN(val)) { lastResult._err = true; lastResult._display = 'Undefined'; }
      else if (!isFinite(val)) { lastResult._err = true; lastResult._display = 'Error'; }
    }
    computed = true;
    activeOp = null;
    addHistory(expression, lastResult);
    updateDisplay();
  } catch (e) {
    document.getElementById('result').innerHTML = 'Error';
    document.getElementById('result').className = 'result error';
    document.getElementById('result').style.fontSize = '';
  }
}

function pressClear() {
  expression = '';
  undoStack = [];
  computed = false;
  lastResult = null;
  activeOp = null;
  updateDisplay();
}

function pressBackspace() {
  if (computed) { pressClear(); return; }
  expression = undoStack.length > 0 ? undoStack.pop() : '';
  activeOp = null;
  updateDisplay();
}

function collapseOne(v) {
  if (v._sum) {
    var L = collapseOne(v._sum.left);
    var R = collapseOne(v._sum.right);
    var val = v._sum.op === '+' ? L.index + R.index : L.index - R.index;
    var r = vReal(val);
    if (isNaN(val)) r._display = 'Undefined';
    else if (val === Infinity) r._display = '∞';
    else if (val === -Infinity) r._display = '−∞';
    return r;
  }
  if (v.type === 'zero') return vReal(0);
  if (v.type === 'inf') {
    var r = vReal(Infinity);
    r._display = '∞';
    return r;
  }
  return v;
}

function canCollapseVal(v) {
  return v && (v._sum || v.type === 'zero' || v.type === 'inf');
}

function pressCollapse() {
  if (!computed || !lastResult || !canCollapseVal(lastResult)) return;
  var original = lastResult.toHTML();
  lastResult = collapseOne(lastResult);
  computed = true;
  updateDisplay();
  document.getElementById('expr').innerHTML = original + ' <span class="ceq">=;</span> ' + lastResult.toHTML();
}

function pressNegate() {
  var m = expression.match(/(-?\d*\.?\d+)$/);
  if (!m) return;
  pushUndo();
  var num = m[1];
  expression = expression.slice(0, -num.length) + (num[0] === '-' ? num.slice(1) : '-' + num);
  updateDisplay();
}

function pressPercent() {
  var m = expression.match(/(-?\d*\.?\d+)$/);
  if (!m) return;
  pushUndo();
  expression = expression.slice(0, -m[1].length) + (parseFloat(m[1]) / 100);
  updateDisplay();
}


// ════════════════════════════════════════════════════════════
// Display Rendering
// ════════════════════════════════════════════════════════════

function renderExpr(raw) {
  if (!raw) return '';
  return raw
    .replace(/inf_(-?\d*\.?\d+)/g, '∞<sub>$1</sub>')
    .replace(/0_(-?\d*\.?\d+)/g,   '0<sub>$1</sub>')
    .replace(/inf_(-?)/g, '∞<sub class="ph">$1_</sub>')
    .replace(/0_(-?)/g,   '0<sub class="ph">$1_</sub>')
    .replace(/ \* /g, ' × ')
    .replace(/ \/ /g, ' ÷ ')
    .replace(/ - /g, ' − ');
}

function getCurrentValue() {
  var raw = expression;
  if (!raw) return { html: '0', type: 'real' };
  var m;
  if ((m = raw.match(/inf_(-?\d*\.?\d+)$/))) return { html: '∞<sub>' + m[1] + '</sub>', type: 'inf' };
  if ((m = raw.match(/0_(-?\d*\.?\d+)$/)))   return { html: '0<sub>' + m[1] + '</sub>', type: 'zero' };
  if (/inf_-?$/.test(raw)) return { html: '∞<sub class="ph">_</sub>', type: 'inf' };
  if (/0_-?$/.test(raw))   return { html: '0<sub class="ph">_</sub>', type: 'zero' };
  if ((m = raw.match(/(-?\d*\.?\d*)$/)) && m[1]) return { html: m[1], type: 'real' };
  return { html: '0', type: 'real' };
}

function updateDisplay() {
  var exprEl = document.getElementById('expr');
  var resultEl = document.getElementById('result');

  // Expression line
  exprEl.innerHTML = computed && lastResult
    ? renderExpr(expression) + ' ='
    : renderExpr(expression) || '&nbsp;';

  // Result
  if (computed && lastResult) {
    resultEl.innerHTML = lastResult.toHTML();
    resultEl.className = 'result' + (lastResult._err ? ' error' : (lastResult.type !== 'real' || lastResult._sum) ? ' virtual' : '');
  } else {
    var cv = getCurrentValue();
    resultEl.innerHTML = cv.html;
    resultEl.className = 'result' + (cv.type !== 'real' ? ' virtual' : '');
  }

  // Auto-size
  var len = resultEl.textContent.length;
  resultEl.style.fontSize = len <= 6 ? '' : len <= 9 ? '52px' : len <= 13 ? '40px' : '28px';

  // Active operator highlight
  document.querySelectorAll('.btn-op[data-op]').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.op === activeOp);
  });

  // Collapse button
  var cb = document.getElementById('collapseBtn');
  var canCollapse = computed && canCollapseVal(lastResult);
  cb.classList.toggle('available', canCollapse);
}


// ════════════════════════════════════════════════════════════
// History
// ════════════════════════════════════════════════════════════

function addHistory(expr, result) {
  historyItems.unshift({ expr: expr, result: result });
  if (historyItems.length > 15) historyItems.pop();
  renderHistory();
}

function renderHistory() {
  var sec = document.getElementById('historySection');
  if (!historyItems.length) { sec.innerHTML = ''; return; }
  sec.innerHTML = '<div class="history-label">History</div><div class="history-list">' +
    historyItems.map(function(h) {
      var cls = h.result._err ? ' error' : (h.result.type !== 'real' || h.result._sum) ? ' virtual' : '';
      return '<div class="history-item">' +
        '<span class="hi-expr">' + renderExpr(h.expr) + '</span>' +
        '<span class="hi-eq">=</span>' +
        '<span class="hi-result' + cls + '">' + h.result.toHTML() + '</span></div>';
    }).join('') + '</div>';
}


// ════════════════════════════════════════════════════════════
// Examples & Mode
// ════════════════════════════════════════════════════════════

function tryExample(expr) {
  pressClear();
  expression = expr;
  pressEquals();
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(function(b, i) {
    b.classList.toggle('active', i === (m === 'vea' ? 0 : 1));
  });
  document.getElementById('examplesSection').style.display = m === 'vea' ? '' : 'none';
  document.getElementById('collapseBtn').style.display = m === 'vea' ? '' : 'none';
  pressClear();
  renderButtons();
}

function renderButtons() {
  var top = mode === 'vea'
    ? '<button class="btn btn-func" onclick="pressClear()">AC</button>' +
      '<button class="btn btn-func" onclick="pressZeroSub()">0<sub>x</sub></button>' +
      '<button class="btn btn-func" onclick="pressInfSub()">∞<sub>x</sub></button>'
    : '<button class="btn btn-func" onclick="pressClear()">AC</button>' +
      '<button class="btn btn-func" onclick="pressNegate()">±</button>' +
      '<button class="btn btn-func" onclick="pressPercent()">%</button>';

  document.getElementById('buttonGrid').innerHTML = top +
    '<button class="btn btn-op" data-op="/" onclick="pressOp(\'/\')">÷</button>' +
    '<button class="btn btn-num" onclick="pressDigit(\'7\')">7</button>' +
    '<button class="btn btn-num" onclick="pressDigit(\'8\')">8</button>' +
    '<button class="btn btn-num" onclick="pressDigit(\'9\')">9</button>' +
    '<button class="btn btn-op" data-op="*" onclick="pressOp(\'*\')">×</button>' +
    '<button class="btn btn-num" onclick="pressDigit(\'4\')">4</button>' +
    '<button class="btn btn-num" onclick="pressDigit(\'5\')">5</button>' +
    '<button class="btn btn-num" onclick="pressDigit(\'6\')">6</button>' +
    '<button class="btn btn-op" data-op="-" onclick="pressOp(\'-\')">−</button>' +
    '<button class="btn btn-num" onclick="pressDigit(\'1\')">1</button>' +
    '<button class="btn btn-num" onclick="pressDigit(\'2\')">2</button>' +
    '<button class="btn btn-num" onclick="pressDigit(\'3\')">3</button>' +
    '<button class="btn btn-op" data-op="+" onclick="pressOp(\'+\')">+</button>' +
    '<button class="btn btn-num btn-wide" onclick="pressDigit(\'0\')">0</button>' +
    '<button class="btn btn-num" onclick="pressDot()">.</button>' +
    '<button class="btn btn-op" onclick="pressEquals()">=</button>';
}


// ════════════════════════════════════════════════════════════
// Keyboard & Touch
// ════════════════════════════════════════════════════════════

document.addEventListener('keydown', function(e) {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  var k = e.key;
  if (k >= '0' && k <= '9') { e.preventDefault(); pressDigit(k); }
  else if (k === '.') { e.preventDefault(); pressDot(); }
  else if (k === '+') { e.preventDefault(); pressOp('+'); }
  else if (k === '-') { e.preventDefault(); pressOp('-'); }
  else if (k === '*') { e.preventDefault(); pressOp('*'); }
  else if (k === '/') { e.preventDefault(); pressOp('/'); }
  else if (k === 'Enter' || k === '=') { e.preventDefault(); pressEquals(); }
  else if (k === 'Escape') { e.preventDefault(); pressClear(); }
  else if (k === 'Backspace') { e.preventDefault(); pressBackspace(); }
});

// Swipe on display to backspace (like Apple Calculator)
(function() {
  var startX = 0;
  var el = document.getElementById('display');
  el.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; }, { passive: true });
  el.addEventListener('touchend', function(e) {
    if (Math.abs(e.changedTouches[0].clientX - startX) > 50) pressBackspace();
  });
})();


// ════════════════════════════════════════════════════════════
// Init
// ════════════════════════════════════════════════════════════

renderButtons();
updateDisplay();
</script>
